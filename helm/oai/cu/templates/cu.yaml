apiVersion: apps/v1
kind: Deployment
metadata:
  name: oai-cu
  labels:
    app: oai-cu
    ran-type: oran
    component: cu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oai-cu
  template:
    metadata:
      labels:
        app: oai-cu
        ran-type: oran
        component: cu
    spec:
      containers:
      - name: cu
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          privileged: true
        env:
        - name: COMPONENT_NAME
          value: cu
---
apiVersion: v1
kind: Service
metadata:
  name: oai-cu
  labels:
    app: oai-cu
spec:
  selector:
    app: oai-cu
  ports:
  - name: ngap
    port: 38412
    targetPort: 38412
    protocol: SCTP
  - name: f1
    port: 38472
    targetPort: 38472
    protocol: SCTP
