apiVersion: v1
kind: ConfigMap
metadata:
  name: oai-cu-config
data:
  gnb.yaml: |
    Active_gNBs:
    - oai-gnb
    Asn1_verbosity: none
    gNBs:
    - gNB_ID: 0xe00
      gNB_name: oai-gnb
      tracking_area_code: 1
      plmn_list:
        - mcc: 208
          mnc: 93
          mnc_length: 2
          snssaiList:
            - sst: 1
              sd: 0x010203
      nr_cellid: 12345678
      min_rxtxtime: 6
      servingCellConfigCommon:
        physCellId: 0
        n_TimingAdvanceOffset: n0
        ssb_PositionsInBurst_PR: SHORT_BITMAP
        ssb_PositionsInBurst_Bitmap: 0x01
        ssb_periodicityServingCell: ms20
        dmrs_TypeA_Position: pos2
        subcarrierSpacing: 30
        dl_frequencyBand: 78
        dl_absoluteFrequencySSB: 632256
        dl_carrierBandwidth: 106
        ul_frequencyBand: 78
        ul_carrierBandwidth: 106
        scs_SpecificCarrierList_dl:
        - offsetToCarrier: 0
          subcarrierSpacing: 30
          carrierBandwidth: 106
        scs_SpecificCarrierList_ul:
        - offsetToCarrier: 0
          subcarrierSpacing: 30
          carrierBandwidth: 106
        tdd_UL_DL_configurationCommon:
          referenceSubcarrierSpacing: 30
          dl_UL_TransmissionPeriodicity: ms5
          nrofDownlinkSlots: 7
          nrofDownlinkSymbols: 6
          nrofUplinkSlots: 2
          nrofUplinkSymbols: 4
      amf_ip_address:
        - ipv4: 10.100.50.249
          ipv6: 192:168:30::17
          active: yes
          preference: ipv4
      NETWORK_INTERFACES:
        GNB_INTERFACE_NAME_FOR_NG_AMF: eth0
        GNB_IPV4_ADDRESS_FOR_NG_AMF: 10.100.50.252
        GNB_INTERFACE_NAME_FOR_NGU: eth0
        GNB_IPV4_ADDRESS_FOR_NGU: 10.100.50.252
        GNB_PORT_FOR_S1U: 2152
    L1s:
    - num_cc: 1
      tr_n_preference: local_L1
      tr_s_preference: local_mac
    RUs:
    - local_rf: yes
      nb_tx: 1
      nb_rx: 1
      att_tx: 0
      att_rx: 0
      bands:
      - 78
      max_pdschReferenceSignalPower: -27
      max_rxgain: 114
      eNB_instances:
      - 0
      clock_src: internal
    MACRLCs:
    - num_cc: 1
      tr_s_preference: local_L1
      tr_n_preference: local_RRC
    log_config:
      global_log_level: info
      global_log_verbosity: medium
      hw_log_level: info
      hw_log_verbosity: medium
      phy_log_level: info
      phy_log_verbosity: medium
      mac_log_level: info
      mac_log_verbosity: medium
      rlc_log_level: info
      rlc_log_verbosity: medium
      pdcp_log_level: info
      pdcp_log_verbosity: medium
      rrc_log_level: info
      rrc_log_verbosity: medium
      ngap_log_level: info
      ngap_log_verbosity: medium
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: n2network-oai-cu
spec:
  config: '{ "cniVersion": "0.3.1", "plugins": [ { "type": "ipvlan", "capabilities": { "ips": true }, "master": "enp3s0", "mode": "l2", "ipam": { "type": "static", "routes": [ { "dst": "0.0.0.0/0", "gw": "10.100.50.254" } ] } } ] }'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oai-cu
  labels:
    app: oai-cu
    ran-type: oran
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oai-cu
  template:
    metadata:
      labels:
        app: oai-cu
        ran-type: oran
      annotations:
        k8s.v1.cni.cncf.io/networks: '[
          { "name": "n2network-oai-cu",
            "ips": [ "10.100.50.252/29" ],
            "gateway": [ "10.100.50.254" ] }
        ]'
    spec:
      containers:
      - name: cu
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          privileged: true
        env:
        - name: USE_ADDITIONAL_OPTIONS
          value: "--sa --rfsim"
        volumeMounts:
        - name: cu-config
          mountPath: /opt/oai-gnb/etc/gnb.yaml
          subPath: gnb.yaml
      volumes:
      - name: cu-config
        configMap:
          name: oai-cu-config
---
apiVersion: v1
kind: Service
metadata:
  name: oai-cu
spec:
  selector:
    app: oai-cu
  ports:
  - name: ngap
    port: 38412
    targetPort: 38412
    protocol: SCTP
  - name: gtp
    port: 2152
    targetPort: 2152
    protocol: UDP
