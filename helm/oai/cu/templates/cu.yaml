apiVersion: v1
kind: ConfigMap
metadata:
  name: oai-cu-config
data:
  cu-init.sh: |
    #!/bin/bash
    export POD_IP=$(awk 'END{print $1}' /etc/hosts)
    export AMF_IP=$(getent hosts open5gs-amf-ngap | awk '{print $1}')
    echo "OAI CU: POD_IP=${POD_IP} AMF_IP=${AMF_IP}"
    mkdir -p /tmp/conf
    sed -e "s|AMF_IP|${AMF_IP}|g" -e "s|POD_IP|${POD_IP}|g" /opt/oai-gnb/etc/gnb.conf > /tmp/conf/cu.conf
    exec /opt/oai-gnb/bin/nr-softmodem -O /tmp/conf/cu.conf
  gnb.conf: |
    # SPDX-License-Identifier: LicenseRef-CSSL-1.0
    
    Active_gNBs = ( "cu-rfsim");
    # Asn1_verbosity, choice in: none, info, annoying
    Asn1_verbosity = "none";
    
    gNBs =
    (
     {
        ////////// Identification parameters:
        gNB_ID = 0xe00;
        gNB_name  =  "cu-rfsim";
    
        // Tracking area code, 0x0000 and 0xfffe are reserved values
        tracking_area_code  =  1;
        plmn_list = ({ mcc = 208; mnc = 93; mnc_length = 2; snssaiList = ({ sst = 1; sd = 0x010203; }) });
    
        nr_cellid = 12345678L;
    
        tr_s_preference = "f1";
    
        local_s_address = "POD_IP";
        remote_s_address = "0.0.0.0"; # multiple DUs
        local_s_portd = 38472;
        remote_s_portd = 38472;
    
    
        # ------- SCTP definitions
        SCTP :
        {
            # Number of streams to use in input/output
            SCTP_INSTREAMS  = 2;
            SCTP_OUTSTREAMS = 2;
        };
    
    
        ////////// AMF parameters:
        amf_ip_address = ({ ipv4 = "AMF_IP"; });
    
        NETWORK_INTERFACES :
        {
            GNB_IPV4_ADDRESS_FOR_NG_AMF = "POD_IP";
            GNB_IPV4_ADDRESS_FOR_NGU = "POD_IP";
            GNB_PORT_FOR_S1U = 2152
        };
      }
    );
    
    security = {
      # preferred ciphering algorithms
      # the first one of the list that an UE supports in chosen
      # valid values: nea0, nea1, nea2, nea3
      ciphering_algorithms = ( "nea0" );
    
      # preferred integrity algorithms
      # the first one of the list that an UE supports in chosen
      # valid values: nia0, nia1, nia2, nia3
      integrity_algorithms = ( "nia2", "nia0" );
    
      # setting 'drb_ciphering' to "no" disables ciphering for DRBs, no matter
      # what 'ciphering_algorithms' configures; same thing for 'drb_integrity'
      drb_ciphering = "yes";
      drb_integrity = "no";
    };
    
    log_config : {
      global_log_level = "info";
      pdcp_log_level = "info";
      rrc_log_level = "info";
      f1ap_log_level = "info";
      ngap_log_level = "info";
    };
    
    e2_agent = {
      near_ric_ip_addr = "127.0.0.1";
      sm_dir = "/usr/local/lib/flexric/"
    };
    
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oai-cu
  labels:
    app: oai-cu
    ran-type: oran
    component: cu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oai-cu
  template:
    metadata:
      labels:
        app: oai-cu
        ran-type: oran
        component: cu
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
      - name: cu
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          privileged: true
        command: ["bash", "/opt/oai-gnb/etc/cu-init.sh"]
        volumeMounts:
        - name: cu-config
          mountPath: /opt/oai-gnb/etc
      volumes:
      - name: cu-config
        configMap:
          name: oai-cu-config
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: oai-cu
spec:
  selector:
    app: oai-cu
  ports:
  - name: ngap
    port: 38412
    targetPort: 38412
    protocol: SCTP
  - name: f1
    port: 38472
    targetPort: 38472
    protocol: SCTP
  - name: gtp
    port: 2152
    targetPort: 2152
    protocol: UDP
