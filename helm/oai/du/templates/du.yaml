apiVersion: apps/v1
kind: Deployment
metadata:
  name: oai-du
  labels:
    app: oai-du
    ran-type: oran
    component: du
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oai-du
  template:
    metadata:
      labels:
        app: oai-du
        ran-type: oran
        component: du
    spec:
      containers:
      - name: du
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          privileged: true
        env:
        - name: COMPONENT_NAME
          value: du
---
apiVersion: v1
kind: Service
metadata:
  name: oai-du
  labels:
    app: oai-du
spec:
  selector:
    app: oai-du
  ports:
  - name: f1
    port: 38472
    targetPort: 38472
    protocol: SCTP
