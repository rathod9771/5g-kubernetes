apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrf
  labels:
    app: nrf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nrf
  template:
    metadata:
      labels:
        app: nrf
    spec:
      containers:
      - name: nrf
        image: {{ .Values.global.image.repository }}:{{ .Values.global.image.tag }}
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        env:
        - name: COMPONENT_NAME
          value: nrf
---
apiVersion: v1
kind: Service
metadata:
  name: nrf
spec:
  selector:
    app: nrf
  ports:
  - port: 7777
    targetPort: 7777
