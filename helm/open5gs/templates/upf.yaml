apiVersion: apps/v1
kind: Deployment
metadata:
  name: upf
  labels:
    app: upf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upf
  template:
    metadata:
      labels:
        app: upf
    spec:
      containers:
      - name: upf
        image: {{ .Values.global.image.repository }}:{{ .Values.global.image.tag }}
        securityContext:
          privileged: true
        env:
        - name: COMPONENT_NAME
          value: upf
---
apiVersion: v1
kind: Service
metadata:
  name: upf
spec:
  selector:
    app: upf
  ports:
  - port: 2152
    targetPort: 2152
    protocol: UDP
