apiVersion: v1
kind: ConfigMap
metadata:
  name: srsran-du-config
data:
  du-init.sh: |
    #!/bin/bash
    export POD_IP=$(awk 'END{print $1}' /etc/hosts)
    export CU_IP=$(getent hosts srsran-cu | awk '{print $1}')
    echo "DU starting: POD_IP=${POD_IP} CU_IP=${CU_IP}"
    mkdir -p /etc/srsran
    sed -e "s|CU_IP|${CU_IP}|g" -e "s|POD_IP|${POD_IP}|g" /mnt/srsran/du.yml > /etc/srsran/du.yml
    exec srsdu -c /etc/srsran/du.yml
  du.yml: |
    f1ap:
      cu_cp_addr: CU_IP
      bind_addr: POD_IP
    f1u:
      bind_port: 2152
      peer_port: 2152
    cell_cfg:
      dl_arfcn: 632628
      band: 78
      channel_bandwidth_MHz: 20
      common_scs: 30
      plmn: "20893"
      tac: 1
      pci: 1
    ru_sdr:
      device_driver: zmq
      device_args: tx_port=tcp://127.0.0.1:2000,rx_port=tcp://127.0.0.1:2001
      srate: 23.04
      tx_gain: 75
      rx_gain: 75
    log:
      filename: /tmp/du.log
      all_level: warning
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: srsran-du
  labels:
    app: srsran-du
    ran-type: oran
    component: du
spec:
  replicas: 1
  selector:
    matchLabels:
      app: srsran-du
  template:
    metadata:
      labels:
        app: srsran-du
        ran-type: oran
        component: du
    spec:
      containers:
      - name: du
        image: ghcr.io/herlesupreeth/docker_srsran:master
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        command: ["bash", "/mnt/srsran/du-init.sh"]
        volumeMounts:
        - name: du-config
          mountPath: /mnt/srsran
      volumes:
      - name: du-config
        configMap:
          name: srsran-du-config
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: srsran-du
spec:
  selector:
    app: srsran-du
  ports:
  - name: f1c
    port: 38472
    targetPort: 38472
    protocol: SCTP
  - name: f1u
    port: 2152
    targetPort: 2152
    protocol: UDP
