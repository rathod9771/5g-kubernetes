apiVersion: v1
kind: ConfigMap
metadata:
  name: srsran-gnb-config
data:
  srsran_init.sh: |
    #!/bin/bash
    export IP_ADDR=$(awk 'END{print $1}' /etc/hosts)
    mkdir -p /etc/srsran
    if [[ -z "$COMPONENT_NAME" ]]; then
      echo "Error: COMPONENT_NAME environment variable not set"; exit 1;
    elif [[ "$COMPONENT_NAME" =~ ^(gnb[[:digit:]]*$) ]]; then
      echo "Configuring component: $COMPONENT_NAME"
      cp /mnt/srsran/${COMPONENT_NAME}.yml /etc/srsran/gnb.yml
    else
      echo "Error: Invalid component name: $COMPONENT_NAME"
    fi
    cp /mnt/srsran/qos.yml /etc/srsran/qos.yml
    sed -i "s|PLMN|${MCC}${MNC}|g" /etc/srsran/gnb.yml
    sed -i "s|AMF_IP|${AMF_IP}|g" /etc/srsran/gnb.yml
    sed -i "s|SRS_GNB_IP|${SRS_GNB_IP}|g" /etc/srsran/gnb.yml
    sed -i "s|TAC|${TAC}|g" /etc/srsran/gnb.yml
    service dbus start && service avahi-daemon start
    cd /mnt/srsran
    exec gnb -c /etc/srsran/gnb.yml -c /etc/srsran/qos.yml
  gnb.yml: |
    cu_cp:
      amf:
        addr: AMF_IP
        bind_addr: SRS_GNB_IP
        supported_tracking_areas:
          - tac: TAC
            plmn_list:
              - plmn: "PLMN"
                tai_slice_support_list:
                  - sst: 1
    ru_sdr:
      device_driver: zmq
      device_args: tx_port=tcp://127.0.0.1:2000,rx_port=tcp://127.0.0.1:2001
      srate: 23.04
      tx_gain: 75
      rx_gain: 75
    cell_cfg:
      dl_arfcn: 632628
      band: 78
      channel_bandwidth_MHz: 20
      common_scs: 30
      plmn: "PLMN"
      tac: TAC
      pci: 1
    log:
      filename: /tmp/gnb.log
      all_level: warning
    # Quality of Service (QoS) example configurations for 5QI 1, 2, 5, 7 and 9
    # Based on 5QI characteristics in TS 23.501 table 5.7.4-1 
    
    # This is a supplementary configuration to modify the RLC and PDCP radio bearers on 
    # a per 5QI basis.
    
    # The default values are picked to try to acheive the QoS requirements defined in
    # TS 23.501 -- System architecture for the 5G System, table 5.7.4-1.
    
    qos:
      #
      # Guaranteed Bitrate 5QIs
      #
      -
        # 5QI=1 e.g. Conversational Voice
        # PDB=100ms PER=10^-2
        five_qi: 1
        pdcp:
          tx:
            sn: 18
            discard_timer: 100
            status_report_required: false
          rx:
            sn: 18
            t_reordering: 0
            out_of_order_delivery: false
        f1u_cu_up:
          backoff_timer: 10
        f1u_du:
          backoff_timer: 10
        rlc:
          mode: um-bidir
          um-bidir:
            tx:
              sn: 12
              queue-size: 16384
              queue-bytes: 6172672
            rx:
              sn: 12
              t-reassembly: 50
