---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: n2network-srsran
spec:
  config: '{ "cniVersion": "0.3.1", "plugins": [ { "type": "ipvlan", "capabilities": { "ips": true }, "master": "enp3s0", "mode": "l2", "ipam": { "type": "static", "routes": [ { "dst": "0.0.0.0/0", "gw": "10.100.50.254" } ] } } ] }'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: srsran-gnb
  labels:
    app: srsran-gnb
    ran-type: cran
spec:
  replicas: 1
  selector:
    matchLabels:
      app: srsran-gnb
  template:
    metadata:
      labels:
        app: srsran-gnb
        ran-type: cran
      annotations:
        k8s.v1.cni.cncf.io/networks: '[
          { "name": "n2network-srsran",
            "ips": [ "10.100.50.251/29" ],
            "gateway": [ "10.100.50.254" ] }
        ]'
    spec:
      containers:
      - name: gnb
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          privileged: true
        env:
        - name: COMPONENT_NAME
          value: gnb
        - name: MCC
          value: "208"
        - name: MNC
          value: "93"
        - name: AMF_IP
          value: "10.100.50.249"
        - name: SRS_GNB_IP
          value: "10.100.50.251"
        - name: TAC
          value: "1"
        volumeMounts:
        - name: srsran-config
          mountPath: /mnt/srsran
      volumes:
      - name: srsran-config
        configMap:
          name: srsran-gnb-config
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: srsran-gnb
spec:
  selector:
    app: srsran-gnb
  ports:
  - name: ngap
    port: 38412
    targetPort: 38412
    protocol: SCTP
  - name: gtp
    port: 2152
    targetPort: 2152
    protocol: UDP
