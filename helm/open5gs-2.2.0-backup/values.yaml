dbURI: "mongodb://open5gs-mongo-custom:27017/open5gs"
populate:
  enabled: true
  image:
    registry: docker.io
    repository: gradiant/open5gs-dbctl
    tag: 0.10.3
    pullPolicy: IfNotPresent
  initCommands:
    - open5gs-dbctl add_ue_with_slice 208930000000003 8baf473f2f8fd09487cccbd7097c6862 8e27b6af0e692e750f32667a3b14605d internet 1 010203
  dbURI: "mongodb://open5gs-mongo-custom:27017/open5gs"

# Disable top-level mongodb sub-chart entirely - using our own custom StatefulSet
mongodb:
  enabled: false

smf:
  enabled: true
  podAnnotations:
    sidecar.istio.io/inject: "false"
  config:
    sbi:
      client:
        nrf:
          enabled: true
        scp:
          enabled: false
    pcrf:
      enabled: false
  dbURI: "mongodb://open5gs-mongo-custom:27017/open5gs"
upf:
  enabled: true
  podAnnotations:
    sidecar.istio.io/inject: "false"

webui:
  enabled: true
  podAnnotations:
    sidecar.istio.io/inject: "false"
  dbURI: "mongodb://open5gs-mongo-custom:27017/open5gs"
  mongodb:
    enabled: false

# 4G - disabled, 5G SA only
hss:
  enabled: false
mme:
  enabled: false
pcrf:
  enabled: false
sgwc:
  enabled: false
sgwu:
  enabled: false

# 5G core NFs
amf:
  enabled: true
  podAnnotations:
    sidecar.istio.io/inject: "false"
  config:
    sbi:
      client:
        nrf:
          enabled: true
        scp:
          enabled: false
    guamiList:
      - plmn_id:
          mcc: "208"
          mnc: "93"
        amf_id:
          region: 2
          set: 1
    taiList:
      - plmn_id:
          mcc: "208"
          mnc: "93"
        tac: [1]
    plmnList:
      - plmn_id:
          mcc: "208"
          mnc: "93"
        s_nssai:
          - sst: 1
            sd: "010203"
ausf:
  enabled: true
  podAnnotations:
    sidecar.istio.io/inject: "false"
  customOpen5gsConfig:
    logger:
      level: info
    global: {}
    ausf:
      serving:
        - plmn_id:
            mcc: "208"
            mnc: "93"
      sbi:
        server:
          - dev: eth0
            port: 7777
        client:
          nrf:
            - uri: http://open5gs-nrf-sbi:7777
bsf:
  enabled: true
  podAnnotations:
    sidecar.istio.io/inject: "false"
  config:
    sbi:
      client:
        nrf:
          enabled: true
        scp:
          enabled: false
nrf:
  enabled: true
  podAnnotations:
    sidecar.istio.io/inject: "false"
nssf:
  enabled: true
  podAnnotations:
    sidecar.istio.io/inject: "false"
  config:
    sbi:
      client:
        nrf:
          enabled: true
        scp:
          enabled: false
    nssiList:
      - addr: nrf
        sst: 1
        sd: "010203"
pcf:
  enabled: true
  podAnnotations:
    sidecar.istio.io/inject: "false"
  config:
    sbi:
      client:
        nrf:
          enabled: true
        scp:
          enabled: false
  dbURI: "mongodb://open5gs-mongo-custom:27017/open5gs"
  mongodb:
    enabled: false
scp:
  enabled: false
  podAnnotations:
    sidecar.istio.io/inject: "false"
  dbURI: "mongodb://open5gs-mongo-custom:27017/open5gs"
  mongodb:
    enabled: false
udm:
  enabled: true
  podAnnotations:
    sidecar.istio.io/inject: "false"
  customOpen5gsConfig:
    logger:
      level: info
    global: {}
    udm:
      serving:
        - plmn_id:
            mcc: "208"
            mnc: "93"
      sbi:
        server:
          - dev: eth0
            port: 7777
        client:
          nrf:
            - uri: http://open5gs-nrf-sbi:7777
udr:
  enabled: true
  podAnnotations:
    sidecar.istio.io/inject: "false"
  customOpen5gsConfig:
    logger:
      level: info
    global: {}
    udr:
      serving:
        - plmn_id:
            mcc: "208"
            mnc: "93"
      sbi:
        server:
          - dev: eth0
            port: 7777
        client:
          nrf:
            - uri: http://open5gs-nrf-sbi:7777
  dbURI: "mongodb://open5gs-mongo-custom:27017/open5gs"
  mongodb:
    enabled: false
