<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>5G Platform</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#080812;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#0f0f1e;border-bottom:1px solid #1e1e3a;flex-shrink:0}
.topbar h1{font-size:13px;font-weight:700;color:#00d4ff;letter-spacing:1px}
.top-btns{display:flex;gap:8px}
.top-btn{padding:5px 16px;border-radius:6px;border:1px solid #2a2a4a;background:transparent;color:#888;font-size:11px;cursor:pointer;transition:all 0.15s;font-weight:600}
.top-btn:hover{border-color:#00d4ff;color:#00d4ff}
.top-btn.active{background:#001a2e;border-color:#00d4ff;color:#00d4ff}
.top-btn.purple:hover{border-color:#a855f7;color:#a855f7}
.top-btn.purple.active{background:#1a0a2e;border-color:#a855f7;color:#a855f7}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:155px;background:#0f0f1e;border-right:1px solid #1e1e3a;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding:10px 8px}
.sb-title{font-size:9px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding:0 2px}
.ran-card{background:#13132a;border:1px solid #1e1e3a;border-radius:8px;padding:8px;margin-bottom:6px;transition:all 0.15s}
.ran-card.disabled{opacity:0.35}
.ran-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.ran-name{font-size:11px;font-weight:700;color:#ccc;display:flex;align-items:center;gap:4px}
.ran-card.deployed .ran-name{color:#00d4ff}
.ran-type{font-size:9px;color:#444;margin-bottom:6px}
.ran-badge{font-size:8px;padding:1px 5px;border-radius:10px}
.badge-live{background:#0a2a1a;color:#00ff88;border:1px solid #00ff8844}
.badge-soon{background:#1a1a1a;color:#333;border:1px solid #222}
.deploy-btn{width:100%;padding:5px 0;border-radius:5px;border:1px solid #2a2a4a;background:transparent;color:#888;font-size:10px;cursor:pointer;transition:all 0.15s;font-weight:600}
.deploy-btn:hover:not(:disabled){border-color:#00d4ff;color:#00d4ff;background:#001a2e}
.deploy-btn.deploying{border-color:#ffaa00;color:#ffaa00;animation:blink 1s infinite}
.deploy-btn.deployed{border-color:#00ff88;color:#00ff88;background:#0a2a1a}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}
.dot{width:6px;height:6px;border-radius:50%;background:#2a2a4a;flex-shrink:0}
.dot.on{background:#00ff88}
.dot.off{background:#2a2a4a}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.blank{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.blank-icon{font-size:52px;opacity:0.15}
.blank-txt{color:#2a2a4a;font-size:12px}
.content-area{flex:1;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.panel{background:#0f0f1e;border:1px solid #1e1e3a;border-radius:12px;overflow:hidden}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #1e1e3a}
.panel-title{font-size:14px;font-weight:700;color:#00d4ff}
.panel-sub{font-size:10px;color:#555;margin-top:2px}
.panel-status{font-size:10px;display:flex;align-items:center;gap:5px;margin-left:12px}
.ok{color:#00ff88}
.warn{color:#ffaa00}
.close-btn{width:24px;height:24px;border-radius:50%;border:1px solid #2a2a4a;background:transparent;color:#555;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.close-btn:hover{border-color:#ff4444;color:#ff4444}
.wf-bar{display:flex;align-items:center;padding:8px 14px;background:#080810;border-bottom:1px solid #1e1e3a;overflow-x:auto;gap:0;flex-shrink:0}
.wf-step{display:flex;align-items:center;gap:5px;flex-shrink:0}
.wf-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:1px solid #2a2a4a;background:#1a1a2e;color:#444}
.wf-dot.done{background:#00ff88;border-color:#00ff88;color:#000}
.wf-dot.active{background:#001a2e;border-color:#00d4ff;color:#00d4ff;animation:blink 1s infinite}
.wf-lbl{font-size:9px;color:#444}
.wf-dot.done~.wf-lbl{color:#00ff88}
.wf-dot.active~.wf-lbl{color:#00d4ff}
.wf-arr{color:#2a2a4a;font-size:11px;margin:0 6px}
.tab-row{display:flex;gap:4px;padding:8px 14px;border-bottom:1px solid #1e1e3a}
.tab{padding:5px 14px;border-radius:6px;border:1px solid transparent;background:transparent;color:#555;font-size:11px;cursor:pointer;font-weight:600;transition:all 0.15s}
.tab:hover{color:#ccc}
.tab.active{background:#001a2e;border-color:#00d4ff44;color:#00d4ff}
.panel-body{padding:12px 14px;max-height:240px;overflow-y:auto}
.log-terminal{background:#050508;border-radius:8px;padding:10px;font-family:monospace;font-size:10px;line-height:1.8;overflow-y:auto;max-height:200px}
.log-ok{color:#00ff88}
.log-err{color:#ff4444}
.log-warn{color:#ffaa00}
.log-info{color:#888}
.loading-txt{color:#333;font-style:italic;padding:10px;font-size:11px}
.process-list{display:flex;flex-direction:column;gap:6px}
.proc-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#080810;border-radius:7px;border:1px solid #1a1a2a}
.proc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.proc-name{font-size:11px;font-weight:700;color:#ccc}
.proc-desc{font-size:10px;color:#555;margin-top:1px}
.proc-badge{font-size:9px;padding:2px 7px;border-radius:10px;margin-left:auto;flex-shrink:0}
.pbg-run{background:#0a2a1a;color:#00ff88;border:1px solid #00ff8844}
.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-card{background:#080810;border-radius:8px;padding:10px;text-align:center;border:1px solid #1a1a2a}
.stat-val{font-size:20px;font-weight:700}
.stat-lbl{font-size:9px;color:#555;margin-top:3px}
.nf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px}
.nf-btn{padding:12px 8px;border-radius:10px;border:1px solid #1e1e3a;background:#13132a;cursor:pointer;text-align:center;transition:all 0.15s}
.nf-btn:hover{border-color:#a855f7;background:#1a0a2e}
.nf-btn.sel{border-color:#a855f7;background:#1a0a2e}
.nf-btn-name{font-size:13px;font-weight:700;color:#ccc;display:flex;align-items:center;justify-content:center;gap:5px}
.nf-btn.sel .nf-btn-name{color:#a855f7}
.nf-btn-st{font-size:9px;color:#555;margin-top:3px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px}
.info-card{background:#080810;border-radius:8px;padding:10px;border:1px solid #1a1a2a}
.info-key{font-size:9px;color:#555;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px}
.info-val{font-size:13px;font-weight:700;color:#ccc}
.info-val.ok{color:#00ff88}
.info-val.blue{color:#00d4ff}
.pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:#00ff88;animation:p 2s infinite;margin-right:4px}
@keyframes p{0%,100%{opacity:1}50%{opacity:0.3}}
.deploying-bar{padding:12px 14px;background:#080810;border-bottom:1px solid #1e1e3a;font-size:11px;color:#ffaa00;display:flex;align-items:center;gap:8px}
.spinner{width:14px;height:14px;border:2px solid #2a2a4a;border-top:2px solid #ffaa00;border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:#0a0a1a}
::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}

.arch-btn,.stack-btn{padding:7px 10px;border-radius:7px;border:1px solid #1e1e3a;background:#13132a;color:#aaa;font-size:11px;cursor:pointer;text-align:left;font-weight:600;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between}
.arch-btn:hover,.stack-btn:hover{border-color:#444}
.arch-btn.sel{border-color:#00d4ff;background:#001a2e;color:#00d4ff}
.stack-btn.sel{border-color:#a855f7;background:#1a0a2e;color:#a855f7}
.arch-btn.disabled{opacity:0.3;cursor:default}
.bdg-mini{font-size:8px;padding:1px 5px;border-radius:10px}
.bdg-mini.live{background:#0a2a1a;color:#00ff88;border:1px solid #00ff8844}
.bdg-mini.soon{background:#1a1a1a;color:#333;border:1px solid #222}
</style>
</head>
<body>
<div id="liveBar" style="display:flex;gap:18px;align-items:center;padding:8px 16px;background:#0d1424;border-bottom:1px solid #1e2a45;font-size:13px;font-family:monospace;flex-wrap:wrap;">
  <span style="color:#8899bb;">LIVE</span>
  <span id="lb-ue" style="color:#666;">UE: ...</span>
  <span id="lb-pdu" style="color:#666;">PDU: ...</span>
  <span id="lb-rtt" style="color:#666;">RTT: ...</span>
  <span id="lb-loss" style="color:#666;">Loss: ...</span>
  <span id="lb-tun" style="color:#666;"></span>
  <span id="lb-updated" style="color:#445;margin-left:auto;font-size:11px;"></span>
</div>

<div class="topbar">
  <h1>⚡ 5G PLATFORM DASHBOARD</h1>
  <div class="top-btns">
    <button class="top-btn purple" id="btn-core" onclick="showCorePanel(this)">◎ 5G Core</button>
    <button class="top-btn" id="btn-ue" onclick="showTopPanel(this,'ue')">UE</button>
    <button class="top-btn" id="btn-slice" onclick="showTopPanel(this,'slice')">Slice / NW</button>
    <button class="top-btn" id="btn-istio" onclick="showTopPanel(this,'istio')">Istio</button>
    <button class="top-btn" id="btn-verify" onclick="manualVerifyClean()">Verify Clean</button>
    <span id="clean-badge" style="font-size:10px;padding:4px 10px;border-radius:6px;font-weight:600"></span>
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sb-title">5G RAN Selector</div>
    <div style="padding:0 2px 8px">
      <div style="font-size:9px;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Step 1 - Architecture</div>
      <div id="arch-list" style="display:flex;flex-direction:column;gap:4px;margin-bottom:12px">
        <button class="arch-btn" data-arch="cran" onclick="selectArch(this,'cran','C-RAN',true)">C-RAN <span class="bdg-mini live">live</span></button>
        <button class="arch-btn" data-arch="oran" onclick="selectArch(this,'oran','O-RAN',true)">O-RAN <span class="bdg-mini live">live</span></button>
        <button class="arch-btn" data-arch="cloudran" onclick="selectArch(this,'cloudran','Cloud-RAN',false)">Cloud-RAN <span class="bdg-mini soon">soon</span></button>
        <button class="arch-btn" data-arch="vcran" onclick="selectArch(this,'vcran','V-CRAN',false)">V-CRAN <span class="bdg-mini soon">soon</span></button>
        <button class="arch-btn" data-arch="hcran" onclick="selectArch(this,'hcran','H-CRAN',false)">H-CRAN <span class="bdg-mini soon">soon</span></button>
        <button class="arch-btn" data-arch="fran" onclick="selectArch(this,'fran','F-RAN',false)">F-RAN <span class="bdg-mini soon">soon</span></button>
      </div>

      <div id="stack-section" style="display:none">
        <div style="font-size:9px;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Step 2 - RAN Software</div>
        <div id="stack-list" style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px">
          <button class="stack-btn" data-stack="srsran" onclick="selectStack(this,'srsran','srsRAN')">srsRAN</button>
          <button class="stack-btn" data-stack="oai" onclick="selectStack(this,'oai','OpenAirInterface')">OAI</button>
        </div>
        <button class="deploy-btn" id="combo-deploy-btn" onclick="deployCombo()" disabled>▶ Deploy</button>
      </div>
    </div>
</div>
  </div>
  <div class="main" id="main">
    <div class="blank">
      <div class="blank-icon">📡</div>
      <div class="blank-txt">Deploy a RAN or select a component from the top bar</div>
    </div>
  </div>
</div>
<script>
const NF_LIST=["AMF","SMF","UPF","NRF","AUSF","UDM","UDR","PCF","NSSF"];
const NF_PODS={AMF:"open5gs-amf",SMF:"open5gs-smf",UPF:"open5gs-upf",NRF:"open5gs-nrf",AUSF:"open5gs-ausf",UDM:"open5gs-udm",UDR:"open5gs-udr",PCF:"open5gs-pcf",NSSF:"open5gs-nssf"};
const NF_COLOR={AMF:"#00d4ff",SMF:"#00aaff",UPF:"#ff6b35",NRF:"#00ff88",AUSF:"#a855f7",UDM:"#f59e0b",UDR:"#ec4899",PCF:"#06b6d4",NSSF:"#84cc16"};
const NF_DESC={AMF:"Access & Mobility — registration, auth, mobility. N2 to gNB via NGAP/SCTP.",SMF:"Session Management — assigns UE IP, GTP tunnel via PFCP to UPF.",UPF:"User Plane — forwards packets via gtp5g kernel module. N3 N4 N6.",NRF:"Network Repository — service registry for all NFs. Port 8000.",AUSF:"Authentication Server — 5G-AKA with K/OPc keys.",UDM:"Unified Data Mgmt — subscriber profiles and auth vectors.",UDR:"Unified Data Repo — raw storage backend for UDM.",PCF:"Policy Control — QoS rules and PCC rules to SMF.",NSSF:"Slice Selection — routes UE to SST=1 SD=010203."};
let podData={};
let currentRAN=null;

async function loadPods(){
  try{
    const r=await fetch("/api/pods");
    const d=await r.json();
    d.pods.forEach(p=>{
      NF_LIST.forEach(nf=>{if(p.name.toLowerCase().includes("open5gs-"+nf.toLowerCase()))podData[nf]=p;});
      if(p.name.includes("ueransim-ue"))podData["UE"]=p;
      if(p.name.includes("ueransim-gnb"))podData["GNB"]=p;
      if(p.name.includes("oai-cu"))podData["OAI-CU"]=p;
      if(p.name.includes("srsran"))podData["SRSRAN"]=p;
    });
    NF_LIST.forEach(nf=>{
      const el=document.getElementById("nfst-"+nf);
      if(el)el.textContent=podData[nf]?(podData[nf].ready+" ✓"):"—";
    });
  }catch(e){}
}

function clearTop(){
  document.querySelectorAll(".top-btn").forEach(b=>b.classList.remove("active"));
}

function blank(){
  clearTop();
  document.querySelectorAll(".ran-card").forEach(c=>c.classList.remove("deployed"));
  currentRAN=null;
  document.getElementById("main").innerHTML='<div class="blank"><div class="blank-icon">📡</div><div class="blank-txt">Deploy a RAN or select a component from the top bar</div></div>';
}

function wfHTML(steps){
  const labels=["Selected","GitHub push","Helm deploy","Pod running","AMF connected"];
  return '<div class="wf-bar">'+steps.map((s,i)=>`<div class="wf-step"><div class="wf-dot ${s}">${s==="done"?"✓":s==="active"?"…":String(i+1)}</div><span class="wf-lbl">${labels[i]}</span></div>${i<4?'<div class="wf-arr">→</div>':""}`).join("")+"</div>";
}

function tabsHTML(podLabel,key,pfx){
  return `<div class="tab-row">
    <button class="tab active" onclick="doTab(this,'logs','${podLabel}','${key}','${pfx}')">Logs</button>
    <button class="tab" onclick="doTab(this,'process','${podLabel}','${key}','${pfx}')">Process</button>
    <button class="tab" onclick="doTab(this,'status','${podLabel}','${key}','${pfx}')">Status</button>
  </div>`;
}

async function fetchLogs(podLabel,tid){
  const el=document.getElementById(tid);
  if(!el)return;
  el.innerHTML='<div class="loading-txt">Fetching live logs from kubectl...</div>';
  try{
    const r=await fetch("/api/logs/"+podLabel);
    const d=await r.json();
    if(!d.logs||!d.logs.trim()){el.innerHTML='<div class="loading-txt">No logs yet</div>';return;}
    const lines=d.logs.trim().split("\n").slice(-50);
    el.innerHTML="";
    lines.forEach(line=>{
      if(!line.trim())return;
      const div=document.createElement("div");
      const isErr=/error|ERRO|fail|panic/i.test(line);
      const isOk=/success|200|OK|accept|established|started|running|done/i.test(line);
      const isWarn=/warn/i.test(line);
      const cls=isErr?"log-err":isOk?"log-ok":isWarn?"log-warn":"log-info";
      div.innerHTML=`<span class="${cls}">${line.replace(/</g,"&lt;")}</span>`;
      el.appendChild(div);
    });
    el.scrollTop=el.scrollHeight;
  }catch(e){
    const el2=document.getElementById(tid);
    if(el2)el2.innerHTML='<div class="loading-txt">Error: '+e.message+'</div>';
  }
}

function buildProcess(key){
  const map={
    cran:[["srsRAN gNB","Centralized gNB process — ZMQ simulation radio"],["NGAP/SCTP","N2 interface to AMF on 10.100.50.249:38412"],["RRC","Radio Resource Control — UE connection"],["GTP-U","User plane tunnel to UPF via N3"]],
    oran:[["OAI CU","Central Unit — PDCP/RRC connected to AMF"],["OAI DU","Distributed Unit — PHY/MAC/RLC layer"],["F1 interface","F1AP control between CU and DU"],["NGAP/SCTP","N2 from CU to AMF port 38412"]],
    AMF:[["AMF Main","Core process — registration and mobility"],["NGAP listener","SCTP on 10.100.50.249:38412"],["GMM","UE state machine — registration/deregistration"],["Istio Envoy","Service mesh sidecar proxy"]],
    SMF:[["SMF Main","Session management process"],["PFCP agent","Session rules pushed to UPF port 8805"],["SBI client","HTTP/2 to NRF/UDM/PCF"],["Istio Envoy","Service mesh sidecar proxy"]],
    UPF:[["UPF Main","User plane forwarder process"],["gtp5g module","Kernel GTP tunnel — v0.8.10"],["PFCP agent","Receives session rules from SMF"],["NAT iptables","MASQUERADE UE traffic → internet"]],
    NRF:[["NRF Main","Service registry — all NFs register here"],["HTTP/2 SBI","Port 8000 — Hello World response"],["MongoDB","Subscriber data connection"],["Istio Envoy","Service mesh sidecar proxy"]],
    AUSF:[["AUSF Main","Authentication process"],["5G-AKA","Auth with K/OPc keys"],["UDM client","Gets auth vectors from UDM"],["Istio Envoy","Service mesh sidecar proxy"]],
    UDM:[["UDM Main","Subscriber data management"],["Auth vectors","Generates 5G-AKA vectors"],["UDR client","Reads raw data from UDR"],["Istio Envoy","Service mesh sidecar proxy"]],
    UE:[["UE Main","UERANSIM simulated phone process"],["NAS","Non-Access Stratum — MM/SM"],["RRC client","Radio Resource Control"],["PDU Session","uesimtun0 tunnel active"]],
  };
  const list=map[key]||[[key+" Main","Main process running"],["Istio Envoy","Service mesh sidecar"]];
  return '<div class="process-list">'+list.map(([n,d])=>`<div class="proc-item"><div class="proc-dot" style="background:#00ff88"></div><div><div class="proc-name">${n}</div><div class="proc-desc">${d}</div></div><span class="proc-badge pbg-run">running</span></div>`).join("")+"</div>";
}

function buildStatus(key){
  const p=podData[key]||{};
  return '<div class="status-grid">'+[
    {v:p.ready||"—",l:"containers",c:"#00d4ff"},
    {v:String(p.restarts||0),l:"restarts",c:Number(p.restarts)>0?"#ffaa00":"#00ff88"},
    {v:p.phase||"Running",l:"phase",c:"#00ff88"},
    {v:key==="UPF"?"no (data plane)":"2/2 injected",l:"Istio",c:key==="UPF"?"#ff6b35":"#a855f7"},
    {v:"12ms",l:"p50 latency",c:"#00aaff"},
    {v:"100%",l:"SBI success",c:"#00ff88"}
  ].map(s=>`<div class="stat-card"><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join("")+"</div>";
}

function doTab(btn,view,podLabel,key,pfx){
  const scope=pfx?document.getElementById(pfx+"wrap"):document;
  scope.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  const body=document.getElementById(pfx+"pbody");
  if(!body)return;
  if(view==="logs"){
    body.innerHTML=`<div class="log-terminal" id="${pfx}lterm"><div class="loading-txt">Loading...</div></div>`;
    fetchLogs(podLabel,pfx+"lterm");
  }else if(view==="process"){
    body.innerHTML=buildProcess(key);
  }else{
    body.innerHTML=buildStatus(key);
  }
}

async function deployRAN(key,name,sub){
  clearTop();
  const btn=document.getElementById("dbtn-"+key);
  const card=document.getElementById("ran-"+key);
  btn.className="deploy-btn deploying";
  btn.textContent="⏳ Deploying...";
  card.classList.add("deployed");
  currentRAN=key;
  const other=key==="cran"?"oran":"cran";
  const obtn=document.getElementById("dbtn-"+other);
  const ocard=document.getElementById("ran-"+other);
  if(obtn){obtn.className="deploy-btn";obtn.textContent="▶ Deploy";}
  if(ocard)ocard.classList.remove("deployed");

  const m=document.getElementById("main");
  m.innerHTML=`<div class="content-area">
    <div class="panel" id="ran-panel-main">
      <div class="panel-hdr">
        <div style="display:flex;align-items:center">
          <div><div class="panel-title">${name}</div><div class="panel-sub">${sub}</div></div>
          <div class="panel-status warn"><div class="spinner"></div>Deploying to Kubernetes...</div>
        </div>
        <button class="close-btn" onclick="blank()">✕</button>
      </div>
      <div class="deploying-bar" id="deploy-progress"><div class="spinner"></div><span id="deploy-msg">Pushing to GitHub and running helm install...</span></div>
      ${wfHTML(["done","active","pending","pending","pending"])}
    </div>
  </div>`;

  try{
    const r=await fetch("/api/deploy",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ran:key})});
    const d=await r.json();
    if(d.status==="success"){
      btn.className="deploy-btn deployed";
      btn.textContent="✓ Deployed";
      showDeployedPanel(key,name,sub);
    }else{
      btn.className="deploy-btn";
      btn.textContent="▶ Deploy";

    }
  }catch(e){
    btn.className="deploy-btn";

    card.classList.remove("deployed");
    blank();
  }
}

let selectedArch=null, selectedStack=null;

function selectArch(btn,arch,label,enabled){
  if(!enabled)return;
  document.querySelectorAll(".arch-btn").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");
  selectedArch={key:arch,label:label};
  selectedStack=null;
  document.querySelectorAll(".stack-btn").forEach(b=>b.classList.remove("sel"));
  document.getElementById("stack-section").style.display="block";
  document.getElementById("combo-deploy-btn").disabled=true;
  document.getElementById("combo-deploy-btn").textContent="\u25b6 Deploy";
}

function selectStack(btn,stack,label){
  document.querySelectorAll(".stack-btn").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");
  selectedStack={key:stack,label:label};
  document.getElementById("combo-deploy-btn").disabled=false;
}

let lastDeployedCombo=null;

function showConfirmModal(comboLabel, onYes){
  const overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999";
  overlay.innerHTML=`<div style="background:#13132a;border:1px solid #2a2a4a;border-radius:12px;padding:20px 24px;max-width:340px;text-align:center">
    <div style="font-size:13px;color:#ccc;margin-bottom:16px;line-height:1.5">Do you really want to switch to <b style="color:#00d4ff">${comboLabel}</b>? The currently active RAN will be stopped.</div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button id="confirm-no" style="padding:6px 18px;border-radius:6px;border:1px solid #2a2a4a;background:transparent;color:#888;font-size:12px;cursor:pointer;font-weight:600">No</button>
      <button id="confirm-yes" style="padding:6px 18px;border-radius:6px;border:1px solid #00d4ff;background:#001a2e;color:#00d4ff;font-size:12px;cursor:pointer;font-weight:600">Yes, switch</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector("#confirm-no").onclick=()=>document.body.removeChild(overlay);
  overlay.querySelector("#confirm-yes").onclick=()=>{document.body.removeChild(overlay); onYes();};
}

function showInfoModal(message){
  const overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999";
  overlay.innerHTML=`<div style="background:#13132a;border:1px solid #2a2a4a;border-radius:12px;padding:20px 24px;max-width:340px;text-align:center">
    <div style="font-size:13px;color:#ccc;margin-bottom:16px;line-height:1.5">${message}</div>
    <button id="info-ok" style="padding:6px 20px;border-radius:6px;border:1px solid #00d4ff;background:#001a2e;color:#00d4ff;font-size:12px;cursor:pointer;font-weight:600">OK</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector("#info-ok").onclick=()=>document.body.removeChild(overlay);
}

async function verifyClean(silent){
  try{
    const r=await fetch("/api/verify-clean");
    const d=await r.json();
    const badge=document.getElementById("clean-badge");
    if(d.clean){
      badge.textContent="\u2713 Clean";
      badge.style.background="#0a2a1a";
      badge.style.color="#00ff88";
      badge.style.border="1px solid #00ff8844";
    }else{
      badge.textContent="\u26a0 "+d.active_combos.length+" RANs active!";
      badge.style.background="#2a0a0a";
      badge.style.color="#ff4444";
      badge.style.border="1px solid #ff444444";
      if(!silent){
        showInfoModal("Warning: multiple RAN combos detected running simultaneously: "+d.active_combos.join(", ")+". Pods: "+d.running_pods.join(", "));
      }
    }
  }catch(e){}
}

function manualVerifyClean(){ verifyClean(false); }

async function deployCombo(){
  if(!selectedArch||!selectedStack)return;
  const comboKey=selectedArch.key+"-"+selectedStack.key;
  const name=selectedStack.label+" on "+selectedArch.label;
  const sub=selectedArch.label+" architecture using "+selectedStack.label+" software";

  if(lastDeployedCombo!==null && lastDeployedCombo===comboKey){
    showInfoModal(name+" is already deployed and running.");
    return;
  }
  if(lastDeployedCombo!==null && lastDeployedCombo!==comboKey){
    showConfirmModal(name, ()=>runDeployCombo(comboKey,name,sub));
    return;
  }
  runDeployCombo(comboKey,name,sub);
}

async function runDeployCombo(comboKey,name,sub){
  const badge=document.getElementById("clean-badge");
  badge.textContent="\u23f3 Switching...";
  badge.style.background="#2a1a0a";
  badge.style.color="#ffaa00";
  badge.style.border="1px solid #ffaa0044";
  clearTop();

  const btn=document.getElementById("combo-deploy-btn");
  btn.className="deploy-btn deploying";
  btn.textContent="\u23f3 Deploying...";

  const m=document.getElementById("main");
  m.innerHTML=`<div class="content-area">
    <div class="panel" id="ran-panel-main">
      <div class="panel-hdr">
        <div style="display:flex;align-items:center">
          <div><div class="panel-title">${name}</div><div class="panel-sub">${sub}</div></div>
          <div class="panel-status warn"><div class="spinner"></div>Deploying to Kubernetes...</div>
        </div>
        <button class="close-btn" onclick="blank()">\u2715</button>
      </div>
      <div class="deploying-bar"><div class="spinner"></div><span>Pushing to GitHub and running helm install...</span></div>
      ${wfHTML(["done","active","pending","pending","pending"])}
    </div>
  </div>`;

  try{
    const r=await fetch("/api/deploy",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ran:comboKey,arch:selectedArch.key,stack:selectedStack.key})});
    const d=await r.json();
    if(d.status==="success"){
      btn.className="deploy-btn deployed";
      btn.textContent="\u2713 Deployed";
      lastDeployedCombo=comboKey;
      verifyClean();
      showComboDeployedPanel(comboKey,name,sub,selectedStack.key);
    }else{
      btn.className="deploy-btn";
      btn.textContent="\u25b6 Deploy";
      alert("Deploy failed: "+(d.error||"Not yet implemented for this combination"));
      blank();
    }
  }catch(e){
    btn.className="deploy-btn";
    btn.textContent="\u25b6 Deploy";
    blank();
  }
}

function showComboDeployedPanel(comboKey,name,sub,stackKey){
  const podLabel=(comboKey==="oran-srsran")?"SRSRAN-CU":(comboKey==="cran-oai")?"OAI-CRAN":(stackKey==="srsran"?"ueransim-gnb":"oai");
  const m=document.getElementById("main");
  m.innerHTML=`<div class="content-area">
    <div class="panel">
      <div class="panel-hdr">
        <div style="display:flex;align-items:center">
          <div><div class="panel-title">${name}</div><div class="panel-sub">${sub}</div></div>
          <div class="panel-status ok"><span class="pulse"></span>Running on Kubernetes</div>
        </div>
        <button class="close-btn" onclick="blank()">\u2715</button>
      </div>
      ${wfHTML(["done","done","done","done","done"])}
      ${tabsHTML(podLabel,stackKey,"")}
      <div class="panel-body" id="pbody">
        <div class="log-terminal" id="lterm"><div class="loading-txt">Loading live logs...</div></div>
      </div>
    </div>
  </div>`;
  fetchLogs(podLabel,"lterm");
}
</script>

<script>
async function refreshLiveBar(){
  try{
    const us = await (await fetch("/api/ue-status")).json();
    document.getElementById("lb-ue").textContent = "UE: " + (us.registered ? "REGISTERED" : "NOT REGISTERED");
    document.getElementById("lb-ue").style.color = us.registered ? "#00ff88" : "#ff4455";
    document.getElementById("lb-pdu").textContent = "PDU: " + (us.pdu_session ? "ACTIVE" : "NONE");
    document.getElementById("lb-pdu").style.color = us.pdu_session ? "#00ff88" : "#ff4455";
    document.getElementById("lb-tun").textContent = us.tun ? "tun: " + us.tun.split(",")[1]?.replace("] is up","").trim() : "";
  }catch(e){}
  try{
    const lt = await (await fetch("/api/latency")).json();
    if(lt.rtt_ms !== null && lt.rtt_ms !== undefined){
      document.getElementById("lb-rtt").textContent = "RTT: " + lt.rtt_ms.toFixed(1) + "ms";
      document.getElementById("lb-rtt").style.color = lt.rtt_ms < 30 ? "#00ff88" : (lt.rtt_ms < 100 ? "#f59e0b" : "#ff4455");
      document.getElementById("lb-loss").textContent = "Loss: " + lt.loss_pct + "%";
      document.getElementById("lb-loss").style.color = lt.loss_pct === 0 ? "#00ff88" : "#ff4455";
    } else {
      document.getElementById("lb-rtt").textContent = "RTT: no user plane";
      document.getElementById("lb-rtt").style.color = "#ff4455";
      document.getElementById("lb-loss").textContent = "Loss: 100%";
      document.getElementById("lb-loss").style.color = "#ff4455";
    }
  }catch(e){}
  document.getElementById("lb-updated").textContent = "updated " + new Date().toLocaleTimeString();
}
refreshLiveBar();
setInterval(refreshLiveBar, 10000);
</script>


<script>
// Restore deployed-state UI from actual cluster state on page load
const COMBO_DISPLAY = {
  "cran-srsran": ["cran", "C-RAN + srsRAN", "Centralized monolithic gNB (srsRAN)"],
  "cran-oai":    ["cran", "C-RAN + OAI",    "Centralized monolithic gNB (OAI)"],
  "oran-srsran": ["oran", "O-RAN + srsRAN", "CU/DU split over F1 (srsRAN)"],
  "oran-oai":    ["oran", "O-RAN + OAI",    "CU/DU split over F1 (OAI)"]
};
async function restoreDeployedState(){
  try{
    const r = await fetch("/api/verify-clean");
    const d = await r.json();
    if(d.active_combos && d.active_combos.length === 1){
      const combo = d.active_combos[0];
      const disp = COMBO_DISPLAY[combo];
      if(disp && typeof showDeployedPanel === "function"){
        lastDeployedCombo = combo;  // arm the already-deployed guard
        showDeployedPanel(disp[0], disp[1], disp[2]);
      }
    }
  }catch(e){ console.log("state restore failed", e); }
}
window.addEventListener("load", restoreDeployedState);
</script>
