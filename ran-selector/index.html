<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5G RAN Selector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 2.2rem;
            color: #00d4ff;
            margin-bottom: 10px;
            text-align: center;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 50px;
            text-align: center;
        }
        .cards {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }
        .card {
            background: #1a1a2e;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 50px 40px;
            width: 220px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: #00d4ff;
            transform: translateY(-5px);
        }
        .card.active {
            border-color: #00ff88;
            background: #0a2a1a;
        }
        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #fff;
        }
        .card.active h2 {
            color: #00ff88;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #333;
            display: inline-block;
            margin-bottom: 20px;
        }
        .card.active .status-dot {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }
        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s;
            background: #00d4ff;
            color: #000;
        }
        .btn:hover { background: #00b8d4; }
        .btn.active { background: #00ff88; color: #000; }
        .btn.loading { background: #ffaa00; color: #000; cursor: wait; }
        .status-bar {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px 40px;
            text-align: center;
            min-width: 480px;
        }
        .status-bar p {
            color: #666;
            font-size: 0.95rem;
        }
        .status-bar p span {
            color: #00d4ff;
        }
    </style>
</head>
<body>

<h1>5G RAN Selector</h1>
<p class="subtitle">Select your Radio Access Network deployment</p>

<div class="cards">
    <div class="card" id="card-cran">
        <div class="status-dot" id="dot-cran"></div>
        <h2>C-RAN</h2>
        <button class="btn" id="btn-cran" onclick="deploy('srsran')">Select</button>
    </div>

    <div class="card" id="card-oran">
        <div class="status-dot" id="dot-oran"></div>
        <h2>O-RAN</h2>
        <button class="btn" id="btn-oran" onclick="deploy('oai')">Select</button>
    </div>
</div>

<div class="status-bar">
    <p id="status-text">Status: <span>Loading...</span></p>
</div>

<script>
async function getStatus() {
    try {
        const res = await fetch("/api/status");
        const data = await res.json();
        updateUI(data.active);
    } catch(e) {
        document.getElementById("status-text").innerHTML = "Status: <span>Connecting...</span>";
    }
}

function updateUI(active) {
    // Reset all
    document.getElementById("card-cran").classList.remove("active");
    document.getElementById("card-oran").classList.remove("active");
    document.getElementById("dot-cran").classList.remove("active");
    document.getElementById("dot-oran").classList.remove("active");
    document.getElementById("btn-cran").className = "btn";
    document.getElementById("btn-cran").textContent = "Select";
    document.getElementById("btn-oran").className = "btn";
    document.getElementById("btn-oran").textContent = "Select";

    if (active === "srsran") {
        document.getElementById("card-cran").classList.add("active");
        document.getElementById("dot-cran").classList.add("active");
        document.getElementById("btn-cran").className = "btn active";
        document.getElementById("btn-cran").textContent = "Running";
        document.getElementById("status-text").innerHTML = "Status: <span>C-RAN is Active</span>";
    } else if (active === "oai") {
        document.getElementById("card-oran").classList.add("active");
        document.getElementById("dot-oran").classList.add("active");
        document.getElementById("btn-oran").className = "btn active";
        document.getElementById("btn-oran").textContent = "Running";
        document.getElementById("status-text").innerHTML = "Status: <span>O-RAN is Active</span>";
    } else {
        document.getElementById("status-text").innerHTML = "Status: <span>No RAN Selected</span>";
    }
}

async function deploy(ran) {
    const btnId = ran === "srsran" ? "btn-cran" : "btn-oran";
    const btn = document.getElementById(btnId);
    btn.className = "btn loading";
    btn.textContent = "Deploying...";
    document.getElementById("status-text").innerHTML = "Status: <span>Deploying...</span>";

    try {
        const res = await fetch("/api/deploy", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ran: ran })
        });
        const data = await res.json();
        if (data.status === "success") {
            setTimeout(getStatus, 3000);
        }
    } catch(e) {
        btn.className = "btn";
        btn.textContent = "Select";
    }
}

getStatus();
setInterval(getStatus, 10000);
</script>
</body>
</html>
